name: Portfolio

permissions:
    contents: read
    pages: write
    id-token: write

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Building Docker image
              run: |
                  docker build --target build-step --output type=local,dest=./out .

            - name: Setup Pages
              uses: actions/configure-pages@v5

            - name: Create SPA 404
              run: cp ./out/app/dist/portfolio/browser/index.html ./out/app/dist/portfolio/browser/404.html

            - name: Disable Jekyll
              run: touch ./out/app/dist/portfolio/browser/.nojekyll

            - name: Add CNAME
              run: |
                  DIST=./out/app/dist/portfolio/browser
                  if [ -f CNAME ]; then cp CNAME $DIST/CNAME; else echo amit-jangid.in > $DIST/CNAME; fi

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: ./out/app/dist/portfolio/browser

    deploy:
        runs-on: ubuntu-latest
        needs: build
        environment:
            name: github-pages
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
