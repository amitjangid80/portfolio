name: Portfolio

permissions:
    contents: write

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Building Docker image
              run: |
                  docker build \
                      --target build-step \
                      --output type=local,dest=./out .

            - name: Create SPA 404
              run: cp ./out/app/dist/portfolio/browser/index.html ./out/app/dist/portfolio/browser/404.html

            - name: Deploy Portfolio UI
              uses: peaceiris/actions-gh-pages@v3
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_dir: ./out/app/dist/portfolio/browser
                  cname: amit-jangid.in
