[build]
# Build, then move all outputs into a `portfolio/` subfolder so URLs
# like /portfolio/main-*.js resolve to actual files.
command = "yarn build:prod && mkdir -p dist/portfolio/browser/portfolio && find dist/portfolio/browser -mindepth 1 -maxdepth 1 ! -name portfolio -exec mv -t dist/portfolio/browser/portfolio {} +"
publish = "dist/portfolio/browser"

## SPA served from /portfolio
[[redirects]]
from = "/portfolio/*"
to = "/portfolio/index.html"
status = 200

[[redirects]]
from = "/portfolio"
to = "/portfolio/index.html"
status = 200

## Optional: send bare root to /portfolio/
[[redirects]]
from = "/"
to = "/portfolio/"
status = 301
